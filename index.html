<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RB19 - Full Circuit & Solid Physics</title>
    <style>
        body { margin: 0; background-color: #87ceeb; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #drop-zone {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            border: 4px dashed #fff; color: #fff; z-index: 100;
            background: rgba(0, 0, 0, 0.8);
        }
        #ui { position: absolute; bottom: 30px; left: 30px; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 4px #000; }
        .speed { font-size: 50px; color: #ff0040; }
        #map-container {
            position: absolute; bottom: 30px; right: 30px;
            width: 200px; height: 200px;
            background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 50%; z-index: 10;
        }
        #map-dot { position: absolute; width: 10px; height: 10px; background: #00ff00; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid white; }
    </style>
</head>
<body>

    <div id="drop-zone"><h1>DRAG RB19 .GLB HERE</h1></div>
    
    <div id="ui">
        <div id="speedo" class="speed">000</div>
        <div>KM/H | WASD | C: CAMERA CYCLE</div>
    </div>

    <div id="map-container">
        <canvas id="map-canvas" width="200" height="200"></canvas>
        <div id="map-dot"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model;
        let speed = 0, camMode = 0;
        const keys = { w: false, a: false, s: false, d: false, ' ': false };
        const trackPoints = [];
        const TRACK_WIDTH = 11;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 100, 1500);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            // Sunlight
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(200, 500, 200);
            scene.add(sun);

            // Ground Plane (Prevents "Floating" look)
            const groundGeo = new THREE.CircleGeometry(3000, 32);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d4c1e, roughness: 1 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.2;
            scene.add(ground);

            generateCircularTrack();
            drawMap();

            window.addEventListener('keydown', e => {
                if(e.key.toLowerCase() === 'c') camMode = (camMode + 1) % 3;
                keys[e.key.toLowerCase()] = true;
            });
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            
            animate();
        }

        function createSponsor(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color; ctx.fillRect(0,0,512,128);
            ctx.fillStyle = 'white'; ctx.font = 'bold 55px Arial';
            ctx.textAlign = 'center'; ctx.fillText(text, 256, 85);
            return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(canvas) });
        }

        function generateCircularTrack() {
            const sponsors = [
                createSponsor("ROLEX", "#006039"),
                createSponsor("PIRELLI", "#d40000"),
                createSponsor("AWS", "#232f3e"),
                createSponsor("PETRONAS", "#00a19c"),
                createSponsor("ORACLE", "#ff0000")
            ];

            const segments = 1000;
            const radius = 600;

            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                // Add "weirdness" to the circle
                const varR = radius + Math.sin(i * 0.05) * 50 + Math.cos(i * 0.02) * 30;
                const x = Math.cos(angle) * varR;
                const z = Math.sin(angle) * varR;
                
                // Calculate tangent for rotation
                const nextAngle = ((i+1) / segments) * Math.PI * 2;
                const nextR = radius + Math.sin((i+1) * 0.05) * 50 + Math.cos((i+1) * 0.02) * 30;
                const nx = Math.cos(nextAngle) * nextR;
                const nz = Math.sin(nextAngle) * nextR;
                const lookAngle = Math.atan2(nx - x, nz - z);

                trackPoints.push({ x, z, angle: lookAngle });

                const group = new THREE.Group();
                group.position.set(x, 0, z);
                group.rotation.y = lookAngle;

                // Road
                const road = new THREE.Mesh(new THREE.PlaneGeometry(TRACK_WIDTH * 2, 10), new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
                road.rotation.x = -Math.PI / 2;
                group.add(road);

                // Curbs
                const curbMat = new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0xffffff : 0xff0000 });
                const lc = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 10.1), curbMat);
                lc.position.set(-TRACK_WIDTH, 0.1, 0); group.add(lc);
                const rc = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 10.1), curbMat);
                rc.position.set(TRACK_WIDTH, 0.1, 0); group.add(rc);

                // Walls & Sand
                const hasSand = Math.sin(i * 0.1) > 0.5;
                const wallX = hasSand ? 22 : 12.2;
                if (hasSand) {
                    const sand = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0xe3b778 }));
                    sand.rotation.x = -Math.PI / 2; sand.position.set(-TRACK_WIDTH-5, 0.02, 0);
                    group.add(sand);
                }

                const sMat = sponsors[Math.floor(i / 20) % sponsors.length];
                const wallGeo = new THREE.BoxGeometry(1.5, 3, 10.1);
                const lw = new THREE.Mesh(wallGeo, sMat); lw.position.set(-wallX, 1.5, 0);
                const rw = new THREE.Mesh(wallGeo, sMat); rw.position.set(wallX, 1.5, 0);
                group.add(lw); group.add(rw);

                scene.add(group);
            }
        }

        function drawMap() {
            const ctx = document.getElementById('map-canvas').getContext('2d');
            ctx.clearRect(0,0,200,200);
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            ctx.beginPath();
            trackPoints.forEach((p, i) => {
                const x = 100 + p.x * 0.12;
                const z = 100 + p.z * 0.12;
                if (i === 0) ctx.moveTo(x, z); else ctx.lineTo(x, z);
            });
            ctx.closePath(); ctx.stroke();
        }

        function updatePhysics() {
            if (!model) return;

            if (keys.w) speed += 0.03;
            if (keys.s) speed -= 0.04;
            if (keys[' ']) speed *= 0.8;
            speed *= 0.99;
            speed = Math.max(-0.8, Math.min(speed, 4.5));

            // FIND NEAREST SEGMENT
            let closest = trackPoints[0];
            let minDist = Infinity;
            for(let i=0; i<trackPoints.length; i+=4) {
                const d = (trackPoints[i].x - model.position.x)**2 + (trackPoints[i].z - model.position.z)**2;
                if (d < minDist) { minDist = d; closest = trackPoints[i]; }
            }

            const dx = model.position.x - closest.x;
            const dz = model.position.z - closest.z;
            const localX = dx * Math.cos(-closest.angle) - dz * Math.sin(-closest.angle);
            const absX = Math.abs(localX);

            const hasSand = Math.sin(trackPoints.indexOf(closest) * 0.1) > 0.5;
            const wallLimit = hasSand ? 21 : 11.5;

            // RIGID COLLISION
            if (absX > wallLimit) {
                speed *= 0.2;
                const correction = (wallLimit - 0.2) * Math.sign(localX);
                const worldCorrect = new THREE.Vector3(correction, 0, 0).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), closest.angle));
                model.position.x = closest.x + worldCorrect.x;
                model.position.z = closest.z + worldCorrect.z;
                model.scale.x = 0.6;
            } else {
                model.scale.x = THREE.MathUtils.lerp(model.scale.x, 1.0, 0.1);
            }

            if (hasSand && absX > 11.5) speed *= 0.92;

            if (keys.a) model.rotation.y += 0.045 / (1 + speed * 0.4);
            if (keys.d) model.rotation.y -= 0.045 / (1 + speed * 0.4);

            model.translateZ(speed);

            // CAMERAS
            const sF = speed / 4.5;
            if (camMode === 0) { // Chase
                const rel = new THREE.Vector3(0, 2.5, -9 - (sF * 15)).applyMatrix4(model.matrixWorld);
                camera.position.lerp(rel, 0.1);
                camera.lookAt(model.position.x, model.position.y + 0.8, model.position.z);
            } else if (camMode === 1) { // Nose
                camera.position.copy(new THREE.Vector3(0, 0.6, 3.5).applyMatrix4(model.matrixWorld));
                camera.lookAt(new THREE.Vector3(0, 0.6, 12).applyMatrix4(model.matrixWorld));
            } else { // T-Cam
                camera.position.copy(new THREE.Vector3(0, 1.5, -0.5).applyMatrix4(model.matrixWorld));
                camera.lookAt(new THREE.Vector3(0, 0.9, 12).applyMatrix4(model.matrixWorld));
            }

            // MAP DOT
            document.getElementById('speedo').innerText = Math.floor(Math.abs(speed) * 105).toString().padStart(3, '0');
            const dot = document.getElementById('map-dot');
            dot.style.left = (100 + model.position.x * 0.12) + 'px';
            dot.style.top = (100 + model.position.z * 0.12) + 'px';
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            renderer.render(scene, camera);
        }

        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', e => e.preventDefault());
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = (ev) => {
                new GLTFLoader().parse(ev.target.result, '', (gltf) => {
                    const box = new THREE.Box3().setFromObject(gltf.scene);
                    const center = box.getCenter(new THREE.Vector3());
                    gltf.scene.position.set(-center.x, -box.min.y, -center.z);
                    const wrapper = new THREE.Group();
                    wrapper.add(gltf.scene);
                    scene.add(wrapper);
                    model = wrapper;
                    dropZone.style.display = 'none';
                });
            };
        });

        init();
    </script>
</body>
</html>
